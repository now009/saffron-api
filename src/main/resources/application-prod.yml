spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:saffron}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

server:
  port: ${API_PORT:8080}

auth:
  server:
    url: ${AUTH_SERVER_URL}
  check:
    enabled: true

app:
  redirect:
    main-url: ${APP_REDIRECT_MAIN_URL:http://localhost:8000/main}
    login-url: ${APP_REDIRECT_LOGIN_URL:http://localhost:8000/login}

# JWT 검증 - secret 은 secret.yml 에서 관리 (Auth 서버와 동일)

cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:8000}"

logging:
  file:
    path: ${LOG_FILE_PATH:C:/temp/api}
