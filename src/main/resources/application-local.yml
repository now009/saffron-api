spring:
  devtools:
    restart:
      enabled: false

  datasource:
    url: jdbc:p6spy:mariadb://localhost:3306/saffron?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: now009
    password: 2799
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver

server:
  port: 8080

auth:
  server:
    url: http://localhost:8090
  check:
    enabled: false   # true: JWT 검증 활성화 / false: 인증 없이 전체 허용 (테스트용)

app:
  redirect:
    main-url: http://localhost:8000/main
    login-url: http://localhost:8000/login

# JWT 검증 - secret 은 secret.yml 에서 관리 (Auth 서버와 동일)

cors:
  allowed-origins: "http://localhost:8000"

logging:
  file:
    path: C:/temp
  http:
    before-security: true   # dev: Security 앞에서 실행 → 인증 거부된 요청까지 모두 로깅

board:
  filePath: C:/temp/board/file

xml-store:
  meta-path: C:/xmlStore/meta
  data-path: C:/xmlStore/data

kafka:
  enabled: false
  bootstrap-servers: localhost:9092

qbank:
  image-dir: C:/temp/qbank/images
  image-path: /qbank-images