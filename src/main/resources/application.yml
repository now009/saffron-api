spring:
  profiles:
    active: local

  application:
    name: saffron-api

---
spring:
  config:
    activate:
      on-profile: local

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${auth.server.url}

server:
  port: 8080

auth:
  server:
    url: http://localhost:8090

app:
  redirect:
    main-url: http://localhost:8000/main

# CORS 허용 origin 목록 - 콤마로 구분하여 추가/수정
cors:
  allowed-origins: "http://localhost:8000"

# 로그 파일 저장 경로 (날짜별 롤링 파일 생성)
# logback-spring.xml 에서 LOG_PATH 변수로 참조됨
logging:
  file:
    path: C:/temp
  level:
    root: INFO
    org.springframework.security: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: prod

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${auth.server.url}

server:
  port: ${API_PORT:8080}

auth:
  server:
    url: ${AUTH_SERVER_URL}

app:
  redirect:
    main-url: ${APP_REDIRECT_MAIN_URL:http://localhost:8000/main}

cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:8000}"

logging:
  file:
    path: ${LOG_FILE_PATH:C:/temp/api}
  level:
    root: INFO
    org.springframework.security: TRACE
